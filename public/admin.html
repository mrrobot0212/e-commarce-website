<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 md:p-10">
    <h1 class="text-3xl mb-6">Orders Dashboard</h1>
    <div id="orders"></div>

    <script>
        fetch("http://localhost:3000/api/orders")
            .then(res => res.json())
            .then(data => {
                const div = document.getElementById("orders");
                div.innerHTML = "";

                if (data.length === 0) {
                    div.innerHTML = "<h2>No Orders Yet</h2>";
                    return;
                }

                data.reverse().forEach(order => {

                    let productsHTML = "";

                    order.items.forEach(item => {
                        productsHTML += `
<div style="padding:6px 0;border-bottom:1px solid #eee">
<b>${item.name}</b> <br>
Qty: ${item.qty} <br>
Price: ৳${item.price}
</div>
`;
                    });

                    div.innerHTML += `
<div class="bg-white p-4 shadow mb-4 rounded-xl">
<h2 class="text-xl font-bold">${order.name} | ${order.phone}</h2>
<p class="mb-2">${order.address}</p>
<p class="text-sm text-gray-500">${order.date}</p>

<div class="mt-3 bg-gray-50 p-3 rounded">
<h3 class="font-bold mb-2">Ordered Products:</h3>
${productsHTML}
</div>

</div>
`;
                });
            });
    </script>
</body>

</html>
